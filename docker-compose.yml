services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: inventario_postgres
    environment:
      POSTGRES_DB: inventario_db
      POSTGRES_USER: usuario_inventario
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U usuario_inventario" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inventario_network

  # Interfaz Gráfica para Base de Datos
  adminer:
    image: adminer
    container_name: inventario_adminer
    ports:
      - "8080:8080"
    networks:
      - inventario_network
    depends_on:
      - postgres

  # Redis para caché y colas
  redis:
    image: redis:7-alpine
    container_name: inventario_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - inventario_network

  # Backend Flask
  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: inventario_backend
    environment:
      DATABASE_URL: postgresql://usuario_inventario:${DB_PASSWORD}@postgres:5432/inventario_db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      FLASK_ENV: development
      FLASK_APP: "app:create_app()"
      N8N_WEBHOOK_URL: http://n8n:5678/webhook
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID_DUENO: ${TELEGRAM_CHAT_ID_DUENO}
      TELEGRAM_CHAT_ID_EMPLEADOS: ${TELEGRAM_CHAT_ID_EMPLEADOS}
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - inventario_network
    restart: unless-stopped

  # Celery Worker para tareas asíncronas
  celery_worker:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: inventario_celery_worker
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      FLASK_APP: "app:create_app()"
      DATABASE_URL: postgresql://usuario_inventario:${DB_PASSWORD}@postgres:5432/inventario_db
      REDIS_URL: redis://redis:6379/0
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID_DUENO: ${TELEGRAM_CHAT_ID_DUENO}
      TELEGRAM_CHAT_ID_EMPLEADOS: ${TELEGRAM_CHAT_ID_EMPLEADOS}
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    networks:
      - inventario_network
    restart: unless-stopped

  # Celery Beat para tareas programadas
  celery_beat:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: inventario_celery_beat
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://usuario_inventario:${DB_PASSWORD}@postgres:5432/inventario_db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    networks:
      - inventario_network
    restart: unless-stopped

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: docker/Dockerfile
      target: development
    container_name: inventario_frontend
    environment:
      VITE_API_URL: /api
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - inventario_network
    restart: unless-stopped

  # n8n para automatizaciones
  n8n:
    image: n8nio/n8n:latest
    container_name: inventario_n8n
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678
      GENERIC_TIMEZONE: America/Santo_Domingo
      TZ: America/Santo_Domingo
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows
      - ./backups:/backups
    ports:
      - "5678:5678"
    depends_on:
      - backend
    networks:
      - inventario_network
    restart: unless-stopped

  # Bot de Telegram
  telegram_bot:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.telegram
    container_name: inventario_telegram_bot
    environment:
      DATABASE_URL: postgresql://usuario_inventario:${DB_PASSWORD}@postgres:5432/inventario_db
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID_DUENO: ${TELEGRAM_CHAT_ID_DUENO}
      TELEGRAM_CHAT_IDS_EMPLEADOS: ${TELEGRAM_CHAT_ID_EMPLEADOS}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - inventario_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  n8n_data:
    driver: local

networks:
  inventario_network:
    driver: bridge
